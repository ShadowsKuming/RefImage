services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3333}"
    volumes:
      - storage:/app/storage
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      NUXT_PUBLIC_API_BASE: "${API_BASE:-http://localhost:8000}"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  storage:
